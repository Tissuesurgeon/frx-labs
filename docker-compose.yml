services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: frx
      POSTGRES_PASSWORD: frx
      POSTGRES_DB: frx_shield
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frx -d frx_shield"]
      interval: 5s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      ANONYMIZED_TELEMETRY: "false"

volumes:
  postgres_data:
  chroma_data:
