# FRX Labs — full stack (infra + app services)
#
# Infra only (local dev with native frontend/backend):
#   docker compose up -d postgres chromadb
#
# Full stack:
#   cp .env.example .env   # set JWT_SECRET, OPENAI_API_KEY, etc.
#   docker compose up -d --build
#
# On-chain chain runner (inside backend container):
#   set FRX_AGENT_PRIVATE_KEY + CHAIN_RUNNER_ENABLED=true in .env

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: frx
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-frx}
      POSTGRES_DB: frx_shield
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frx -d frx_shield"]
      interval: 5s
      timeout: 5s
      retries: 10

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "${CHROMA_PORT:-8000}:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      ANONYMIZED_TELEMETRY: "false"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://frx:${POSTGRES_PASSWORD:-frx}@postgres:5432/frx_shield}
      API_HOST: 0.0.0.0
      API_PORT: 8080
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      SUI_MODE: ${SUI_MODE:-mock}
      SUI_NETWORK: ${SUI_NETWORK:-testnet}
      FRX_WALLET_PACKAGE_ID: ${FRX_WALLET_PACKAGE_ID:-}
      FRX_AGENT_PRIVATE_KEY: ${FRX_AGENT_PRIVATE_KEY:-}
      FRX_AGENT_ADDRESS: ${FRX_AGENT_ADDRESS:-}
      DEMO_RUNNER_ENABLED: ${DEMO_RUNNER_ENABLED:-true}
      CHAIN_RUNNER_ENABLED: ${CHAIN_RUNNER_ENABLED:-false}
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
        NEXT_PUBLIC_SUI_NETWORK: ${NEXT_PUBLIC_SUI_NETWORK:-testnet}
        NEXT_PUBLIC_SUI_RPC_URL: ${NEXT_PUBLIC_SUI_RPC_URL:-https://fullnode.testnet.sui.io:443}
        NEXT_PUBLIC_FRX_WALLET_PACKAGE_ID: ${NEXT_PUBLIC_FRX_WALLET_PACKAGE_ID:-}
        NEXT_PUBLIC_FRX_AGENT_ADDRESS: ${NEXT_PUBLIC_FRX_AGENT_ADDRESS:-}
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  chroma_data:
