# Production stack — deploy each service to Railway or run locally.
# Usage: docker compose -f docker-compose.prod.yml up -d --build
#
# Copy .env.example to .env and set JWT_SECRET, DATABASE_URL overrides, etc.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: frx
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-frx}
      POSTGRES_DB: frx_shield
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frx -d frx_shield"]
      interval: 5s
      timeout: 5s
      retries: 10

  chromadb:
    image: chromadb/chroma:latest
    environment:
      ANONYMIZED_TELEMETRY: "false"
    volumes:
      - chroma_data:/chroma/chroma

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://frx:${POSTGRES_PASSWORD:-frx}@postgres:5432/frx_shield
      API_HOST: 0.0.0.0
      API_PORT: 8080
      AI_ENGINE_URL: http://ai-engine:8001
      CHAIN_RUNNER_URL: http://chain-runner:8090
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      SUI_MODE: ${SUI_MODE:-mock}
      SUI_NETWORK: ${SUI_NETWORK:-testnet}
      FRX_WALLET_PACKAGE_ID: ${FRX_WALLET_PACKAGE_ID:-}
      FRX_AGENT_PRIVATE_KEY: ${FRX_AGENT_PRIVATE_KEY:-}
      FRX_AGENT_ADDRESS: ${FRX_AGENT_ADDRESS:-}
      DEMO_RUNNER_ENABLED: ${DEMO_RUNNER_ENABLED:-true}
    depends_on:
      postgres:
        condition: service_healthy
      ai-engine:
        condition: service_started

  ai-engine:
    build:
      context: .
      dockerfile: apps/ai-engine/Dockerfile
    environment:
      PORT: 8001
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    depends_on:
      - chromadb

  chain-runner:
    build:
      context: .
      dockerfile: apps/chain-runner/Dockerfile
    environment:
      PORT: 8090
      SUI_NETWORK: ${SUI_NETWORK:-testnet}
      FRX_WALLET_PACKAGE_ID: ${FRX_WALLET_PACKAGE_ID:-}
      FRX_AGENT_PRIVATE_KEY: ${FRX_AGENT_PRIVATE_KEY:-}
    profiles:
      - onchain

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
        NEXT_PUBLIC_SUI_NETWORK: ${NEXT_PUBLIC_SUI_NETWORK:-testnet}
        NEXT_PUBLIC_FRX_WALLET_PACKAGE_ID: ${NEXT_PUBLIC_FRX_WALLET_PACKAGE_ID:-}
        NEXT_PUBLIC_FRX_AGENT_ADDRESS: ${NEXT_PUBLIC_FRX_AGENT_ADDRESS:-}
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  chroma_data:
